<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Gardaş Cinema</title>
    <style>
        body { background: #141414; color: white; font-family: sans-serif; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #1a1a1a; border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #333; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .info { padding: 10px; text-align: center; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; }
        .modal-content { width: 90%; max-width: 1000px; margin: 50px auto; background: #1a1a1a; padding: 20px; position: relative; border-radius: 15px; }
        .close { position: absolute; top: 10px; right: 20px; font-size: 40px; cursor: pointer; color: #fff; }
        
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; border-radius: 8px; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .btn-izle { background: #E50914; color: white; padding: 15px; border: none; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="root" class="grid"></div>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="durdur()">&times;</span>
            <div id="videoAlani"></div>
        </div>
    </div>

    <script>
        function oynat(id) {
            const container = document.getElementById('videoAlani');
            // İŞTE KRİTİK NOKTA: .biz oldu!
            container.innerHTML = `
                <div class="video-wrapper">
                    <iframe 
                        src="https://vidmoly.biz/embed-${id}.html" 
                        allowfullscreen 
                        allow="autoplay; encrypted-media" 
                        referrerpolicy="no-referrer"
                    ></iframe>
                </div>`;
            document.getElementById('playerModal').style.display = 'block';
        }

        function durdur() {
            document.getElementById('videoAlani').innerHTML = '';
            document.getElementById('playerModal').style.display = 'none';
        }

        fetch('film.json?v=' + Date.now())
        .then(res => res.json())
        .then(data => {
            const root = document.getElementById('root');
            data.filmler.forEach(f => {
                root.innerHTML += `
                    <div class="card" onclick="oynat('${f.id}')">
                        <img src="${f.afis}">
                        <div class="info">
                            <h3>${f.ad}</h3>
                            <button class="btn-izle">İZLE</button>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
