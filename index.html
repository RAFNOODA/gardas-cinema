<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gardaş Cinema - Premium</title>
    <style>
        :root { --red: #E50914; --bg: #141414; --card-bg: #1a1a1a; --hover-bg: #2a2a2a; }
        * { box-sizing: border-box; }
        body { 
            background: var(--bg); color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0 auto; padding: 10px; overflow-x: hidden; max-width: 100%; 
        }

        .search-container {
            position: sticky; top: 0; background: rgba(20, 20, 20, 0.95);
            padding: 15px 0; z-index: 100; margin-bottom: 20px; backdrop-filter: blur(5px);
        }
        .search-input {
            width: 100%; padding: 15px 20px; font-size: 16px;
            background: var(--card-bg); border: 2px solid #333;
            border-radius: 25px; color: white; outline: none; transition: all 0.3s ease;
        }
        .search-input:focus { border-color: var(--red); box-shadow: 0 0 15px rgba(229, 9, 20, 0.3); }
        
        .section-title { 
            font-size: 20px; border-left: 4px solid var(--red); 
            padding-left: 12px; margin: 25px 0 15px; text-transform: uppercase; 
        }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 30px; }
        @media (min-width: 900px) { .grid { grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 20px; } }
        
        .card { 
            background: var(--card-bg); border-radius: 8px; overflow: hidden; 
            cursor: pointer; transition: transform 0.3s ease; border: 1px solid #333; position: relative; 
        }
        .card:hover { transform: scale(1.03); border-color: var(--red); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #333; display: block; }
        .badge { position: absolute; top: 6px; right: 6px; background: var(--red); padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        
        .info { padding: 8px; text-align: center; }
        .info h3 { margin: 0; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; }
        .modal-content { width: 95%; max-width: 900px; margin: 20px auto; background: #1a1a1a; padding: 20px; border-radius: 12px; border: 1px solid #333; display: flex; flex-direction: column; gap: 20px; position: relative; }
        @media (min-width: 768px) { .modal-content { flex-direction: row; margin: 50px auto; } }

        .close { position: absolute; top: 10px; right: 15px; font-size: 30px; cursor: pointer; color: #fff; z-index: 1001; }
        .detay-afis { width: 100%; max-width: 220px; border-radius: 8px; }
        .btn-izle { background: var(--red); color: white; padding: 12px 30px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        
        .bolum-konteynir { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; margin-top: 15px; }
        .bolum-item { background: #333; padding: 10px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 12px; }

        .video-container { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background: #000; }
        video { width: 100%; max-height: 100vh; outline: none; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Film veya dizi ara..." onkeyup="icerikAra()">
    </div>

    <div id="noResults" style="display:none; text-align:center; padding:40px; color:#888;">Sonuç bulunamadı.</div>
    <div id="root"></div>

    <!-- DETAY MODALI -->
    <div id="detayModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="kapat('detayModal')">&times;</span>
            <img id="m-afis" class="detay-afis" src="">
            <div style="flex: 1;">
                <h1 id="m-baslik" style="margin:0; color:var(--red);"></h1>
                <div id="m-puan" style="color:#00d573; font-weight:bold; margin:10px 0;"></div>
                <p id="m-ozet" style="line-height:1.6; color:#ddd; font-size: 14px;"></p>
                <div id="m-kontrol"></div>
                <div id="m-bolumler" class="bolum-konteynir"></div>
            </div>
        </div>
    </div>

    <!-- OYNATICI MODALI -->
    <div id="playerModal" class="modal">
        <span class="close" style="z-index: 1002;" onclick="durdurVideo()">&times;</span>
        <div class="video-container">
            <video id="nativePlayer" controls crossorigin="anonymous" playsinline></video>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://withered-poetry-11d2.musabhde.workers.dev/";
        let globalVeri = null;

        function oynat(id) {
            const videoElement = document.getElementById('nativePlayer');
            const proxyLink = `${WORKER_URL}?id=${id}&t=${Date.now()}`;
            
            videoElement.src = proxyLink;
            document.getElementById('playerModal').style.display = 'block';
            document.body.style.overflow = 'hidden'; 
            videoElement.load();
            videoElement.play().catch(e => console.log("Oynatma hatası:", e));
        }

        function durdurVideo() {
            const v = document.getElementById('nativePlayer');
            v.pause(); v.src = '';
            document.getElementById('playerModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function kapat(id) { document.getElementById(id).style.display = 'none'; document.body.style.overflow = 'auto'; }

        function icerikAra() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            let hasResults = false;
            for (let card of cards) {
                let title = card.querySelector('h3').innerText.toLowerCase();
                if (title.includes(input)) { card.style.display = ""; hasResults = true; } 
                else { card.style.display = "none"; }
            }
            document.getElementById('noResults').style.display = hasResults ? "none" : "block";
        }

        function detayGoster(item, isDizi, diziAnahtari) {
            document.getElementById('m-baslik').innerText = item.ad;
            document.getElementById('m-afis').src = item.afis;
            document.getElementById('m-ozet').innerText = item.konu || "Açıklama yok.";
            document.getElementById('m-puan').innerText = `⭐ TMDB: ${item.puan || '0.0'}`;
            
            const k = document.getElementById('m-kontrol');
            const b = document.getElementById('m-bolumler');
            b.innerHTML = ''; k.innerHTML = '';

            if(isDizi) {
                const d = globalVeri.diziler[diziAnahtari];
                for(let s in d.sezonlar) {
                    b.innerHTML += `<div style="grid-column: 1/-1; color:var(--red); font-weight:bold; margin-top:10px;">SEZON ${s}</div>`;
                    d.sezonlar[s].forEach(ep => {
                        b.innerHTML += `<div class="bolum-item" onclick="oynat('${ep.id}')">Bölüm ${ep.bolum}</div>`;
                    });
                }
            } else {
                k.innerHTML = `<button class="btn-izle" onclick="oynat('${item.id}')">HEMEN İZLE</button>`;
            }
            document.getElementById('detayModal').style.display = 'block';
        }

        // VERİLERİ VE KATEGORİLERİ ÇEK
        fetch('film.json?v=' + Date.now())
        .then(res => res.json())
        .then(data => {
            globalVeri = data;
            const root = document.getElementById('root');
            let kategoriler = {"TÜM İÇERİKLER": []};

            // Dizileri kategorilere ayır
            for (let anahtar in data.diziler) {
                const d = data.diziler[anahtar];
                kategoriler["TÜM İÇERİKLER"].push({isDizi: true, key: anahtar, data: d});
                d.kategoriler.forEach(k => {
                    if(!kategoriler[k]) kategoriler[k] = [];
                    kategoriler[k].push({isDizi: true, key: anahtar, data: d});
                });
            }

            // Filmleri kategorilere ayır
            data.filmler.forEach(f => {
                kategoriler["TÜM İÇERİKLER"].push({isDizi: false, data: f});
                f.kategoriler.forEach(k => {
                    if(!kategoriler[k]) kategoriler[k] = [];
                    kategoriler[k].push({isDizi: false, data: f});
                });
            });

            // Ekrana bas
            for (let kat in kategoriler) {
                let html = `<div class="section-title">${kat}</div><div class="grid">`;
                kategoriler[kat].forEach(obj => {
                    const veriStr = JSON.stringify(obj.data).replace(/'/g, "&apos;").replace(/"/g, "&quot;");
                    html += `
                        <div class="card" onclick='detayGoster(${veriStr}, ${obj.isDizi}, "${obj.key || ''}")'>
                            <div class="badge">${obj.isDizi ? 'DİZİ' : 'FİLM'}</div>
                            <img src="${obj.data.afis}">
                            <div class="info"><h3>${obj.data.ad}</h3></div>
                        </div>`;
                });
                root.innerHTML += html + `</div>`;
            }
        });
    </script>
</body>
</html>
