<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <!-- Viewport çok kritikti, senin kodda zaten varmış, süper -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gardaş Cinema - Premium</title>
    <style>
        :root { --red: #E50914; --bg: #141414; --card-bg: #1a1a1a; }
        
        * { box-sizing: border-box; } /* Taşmaları önleyen kritik ayar */

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0 auto; /* BÜYÜK EKRANLARDA ORTALAMASI İÇİN AUTO EKLENDİ */
            padding: 10px; 
            overflow-x: hidden; 
            max-width: 100%; /* Normalde tam genişlik */
        }
        
        .section-title { 
            font-size: 20px; 
            border-left: 4px solid var(--red); 
            padding-left: 12px; 
            margin: 25px 0 15px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        /* Responsive Grid: Mobilde 2, Tablette 3, PC'de otomatik */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            margin-bottom: 30px; 
        }

        @media (min-width: 600px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        
        /* PC EKRANLARI İÇİN (Ferah görünüm) */
        @media (min-width: 900px) { 
            .grid { grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 20px; padding: 0 10px; } 
        }

        /* YENİ EKLENEN: ANDROID TV VE DEV EKRANLAR İÇİN */
        @media (min-width: 1500px) {
            body {
                max-width: 1600px; /* TV'de çok fazla yayılmasın, ortada toplansın */
                padding: 30px;
            }
            .section-title {
                font-size: 26px; /* Uzaktan okunsun diye başlıklar büyüdü */
            }
            .grid { 
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); /* Afişler TV'de biraz daha büyük */
                gap: 25px; 
            }
            .info h3 {
                font-size: 16px; /* TV'de film isimleri rahat okunsun */
            }
        }

        /* Kart Tasarımı */
        .card { 
            background: var(--card-bg); 
            border-radius: 8px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: transform 0.3s ease; 
            border: 1px solid #333; 
            position: relative; 
            width: 100%;
        }
        .card:hover { transform: scale(1.03); border-color: var(--red); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #333; display: block; }
        .badge { position: absolute; top: 6px; right: 6px; background: var(--red); padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; z-index: 5; }
        
        .info { padding: 8px; text-align: center; }
        .info h3 { margin: 0; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Detay Modalı */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; }
        
        .modal-content { 
            width: 95%; 
            max-width: 900px; 
            margin: 20px auto; 
            background: #1a1a1a; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            position: relative; 
        }

        @media (min-width: 768px) {
            .modal-content { flex-direction: row; margin: 50px auto; padding: 30px; }
            .detay-afis { width: 280px !important; }
            .info h3 { font-size: 14px; }
        }

        /* YENİ EKLENEN: TV MODAL (Detay Ekranı) AYARLARI */
        @media (min-width: 1500px) {
            .modal-content {
                max-width: 1200px; /* TV'de film detayı kutusu büyüdü */
                padding: 40px;
                margin: 80px auto;
            }
            .detay-afis { width: 350px !important; max-width: 350px; }
            #m-baslik { font-size: 36px !important; }
            .puan-alani { font-size: 22px; }
            .kadro-text, #m-ozet { font-size: 18px !important; }
            .btn-izle { font-size: 22px; padding: 15px 40px; }
            .bolum-item { font-size: 16px; padding: 15px; } /* Kumanda ile kolay basılsın diye butonlar büyüdü */
        }

        .close { position: absolute; top: 10px; right: 15px; font-size: 30px; cursor: pointer; color: #fff; z-index: 1001; opacity: 0.7; }
        .close:hover { opacity: 1; }
        
        .detay-afis { width: 100%; max-width: 220px; margin: 0 auto; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .puan-alani { color: #00d573; font-weight: bold; font-size: 18px; margin: 10px 0; display: flex; align-items: center; gap: 8px; }
        .kadro-text { color: #aaa; font-size: 13px; margin-bottom: 15px; line-height: 1.4; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .btn-izle { background: var(--red); color: white; padding: 12px 30px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; margin-top: 10px; }
        
        .bolum-konteynir { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; margin-top: 15px; }
        .bolum-item { background: #333; padding: 10px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 12px; transition: background 0.2s; }
        .bolum-item:hover { background: var(--red); }
        
        /* Oynatıcı Alanı */
        #player-wrapper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 10px; }
        iframe { width: 100%; max-width: 1000px; height: 60vh; border: none; border-radius: 8px; background: #000; }
        
        @media (min-width: 768px) { iframe { height: 80vh; } }
        /* YENİ EKLENEN: TV OYNATICI AYARLARI */
        @media (min-width: 1500px) { iframe { max-width: 1500px; height: 85vh; } }
    </style>
</head>
<body>

    <div id="root"></div>

    <!-- Detay Modal -->
    <div id="detayModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="kapat('detayModal')">&times;</span>
            <img id="m-afis" class="detay-afis" src="">
            <div style="flex: 1;">
                <h1 id="m-baslik" style="margin:0; color:var(--red); font-size: 26px;"></h1>
                <div id="m-puan" class="puan-alani"></div>
                <div class="kadro-text"><b>Oyuncular:</b> <span id="m-kadro"></span></div>
                <p id="m-ozet" style="line-height:1.6; color:#ddd; font-size: 14px;"></p>
                
                <div id="m-kontrol"></div>
                <div id="m-bolumler" class="bolum-konteynir"></div>
            </div>
        </div>
    </div>

    <!-- Video Modal -->
    <div id="playerModal" class="modal">
        <span class="close" onclick="durdurVideo()">&times;</span>
        <div id="player-wrapper">
            <iframe id="googlePlayer" src="" allow="autoplay; fullscreen"></iframe>
        </div>
    </div>

    <script>
        let globalVeri = null;

        function oynat(id) {
            document.getElementById('googlePlayer').src = `https://drive.google.com/file/d/${id}/preview`;
            document.getElementById('playerModal').style.display = 'block';
            document.body.style.overflow = 'hidden'; // Kaydırmayı engelle
        }

        function durdurVideo() {
            document.getElementById('googlePlayer').src = '';
            document.getElementById('playerModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function kapat(id) { 
            document.getElementById(id).style.display = 'none'; 
            document.body.style.overflow = 'auto';
        }

        function detayGoster(item, isDizi, diziAnahtari) {
            document.getElementById('m-baslik').innerText = item.ad;
            document.getElementById('m-afis').src = item.afis || 'https://via.placeholder.com/300x450?text=Resim+Yok';
            document.getElementById('m-ozet').innerText = item.konu || "Açıklama mevcut değil.";
            document.getElementById('m-puan').innerHTML = `⭐ TMDB: ${item.puan || '0.0'}`;
            document.getElementById('m-kadro').innerText = item.oyuncular || "Bilgi bulunamadı.";
            
            const kontrol = document.getElementById('m-kontrol');
            const bolumler = document.getElementById('m-bolumler');
            bolumler.innerHTML = '';
            kontrol.innerHTML = '';

            if(isDizi) {
                const dizi = globalVeri.diziler[diziAnahtari];
                kontrol.innerHTML = `<h3 style="font-size:16px; margin-top:15px; border-bottom:1px solid #333; padding-bottom:5px;">Bölümler</h3>`;
                for(let s in dizi.sezonlar) {
                    bolumler.innerHTML += `<div style="grid-column: 1/-1; color:var(--red); font-weight:bold; margin-top:5px; font-size:13px;">SEZON ${s}</div>`;
                    dizi.sezonlar[s].sort((a,b) => a.bolum - b.bolum).forEach(b => {
                        bolumler.innerHTML += `<div class="bolum-item" onclick="oynat('${b.id}')">Bölüm ${b.bolum}</div>`;
                    });
                }
            } else {
                kontrol.innerHTML = `<button class="btn-izle" onclick="oynat('${item.id}')">HEMEN İZLE</button>`;
            }
            
            document.getElementById('detayModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        fetch('film.json?v=' + Date.now())
        .then(res => res.json())
        .then(data => {
            globalVeri = data;
            const root = document.getElementById('root');
            let kategoriler = {"TÜM İÇERİKLER": []};

            for (let anahtar in data.diziler) {
                const d = data.diziler[anahtar];
                kategoriler["TÜM İÇERİKLER"].push({isDizi: true, key: anahtar, data: d});
                d.kategoriler.forEach(k => {
                    if(!kategoriler[k]) kategoriler[k] = [];
                    kategoriler[k].push({isDizi: true, key: anahtar, data: d});
                });
            }

            data.filmler.forEach(f => {
                kategoriler["TÜM İÇERİKLER"].push({isDizi: false, data: f});
                f.kategoriler.forEach(k => {
                    if(!kategoriler[k]) kategoriler[k] = [];
                    kategoriler[k].push({isDizi: false, data: f});
                });
            });

            for (let kat in kategoriler) {
                let html = `<div class="section-title">${kat}</div><div class="grid">`;
                kategoriler[kat].forEach(obj => {
                    const veriStr = JSON.stringify(obj.data).replace(/'/g, "&apos;").replace(/"/g, "&quot;");
                    html += `
                        <div class="card" onclick='detayGoster(${veriStr}, ${obj.isDizi}, "${obj.key || ''}")'>
                            <div class="badge">${obj.isDizi ? 'DİZİ' : 'FİLM'}</div>
                            <img src="${obj.data.afis || ''}" onerror="this.src='https://via.placeholder.com/190x280?text=Afiş+Yok'">
                            <div class="info"><h3>${obj.data.ad}</h3></div>
                        </div>`;
                });
                root.innerHTML += html + `</div>`;
            }
        });
    </script>
</body>
</html>
