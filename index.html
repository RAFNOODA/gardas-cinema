<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gardaş Cinema - Premium</title>
    <style>
        :root { --red: #E50914; --bg: #141414; --card-bg: #1a1a1a; --hover-bg: #2a2a2a; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0 auto; padding: 10px; overflow-x: hidden; }
        
        .search-container { position: sticky; top: 0; background: rgba(20, 20, 20, 0.95); padding: 15px 0; z-index: 100; margin-bottom: 20px; backdrop-filter: blur(5px); }
        .search-input { width: 100%; padding: 15px 20px; font-size: 16px; background: var(--card-bg); border: 2px solid #333; border-radius: 25px; color: white; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: var(--red); box-shadow: 0 0 15px rgba(229, 9, 20, 0.3); }
        
        .section-title { font-size: 20px; border-left: 4px solid var(--red); padding-left: 12px; margin: 25px 0 15px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 30px; }
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 900px) { .grid { grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 20px; padding: 0 10px; } }
        
        .card { background: var(--card-bg); border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #333; position: relative; width: 100%; }
        .card:hover { transform: scale(1.03); border-color: var(--red); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #333; display: block; }
        .badge { position: absolute; top: 6px; right: 6px; background: var(--red); padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; z-index: 5; }
        .info { padding: 8px; text-align: center; }
        .info h3 { margin: 0; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; }
        .modal-content { width: 95%; max-width: 900px; margin: 20px auto; background: #1a1a1a; padding: 20px; border-radius: 12px; border: 1px solid #333; display: flex; flex-direction: column; gap: 20px; position: relative; }
        @media (min-width: 768px) { .modal-content { flex-direction: row; margin: 50px auto; padding: 30px; } }

        .close { position: absolute; top: 10px; right: 15px; font-size: 35px; cursor: pointer; color: #fff; z-index: 1001; text-shadow: 0 0 10px #000; }
        .detay-afis { width: 100%; max-width: 220px; margin: 0 auto; border-radius: 8px; }
        .puan-alani { color: #00d573; font-weight: bold; font-size: 18px; margin: 10px 0; }
        .btn-izle { background: var(--red); color: white; padding: 12px 30px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; margin-top: 10px; transition: 0.2s; }
        .btn-izle:hover { background: #b20710; }
        
        .bolum-konteynir { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; margin-top: 15px; }
        .bolum-item { background: #333; padding: 10px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .bolum-item:hover { background: var(--red); }

        .video-container { width:100%; height:100vh; display:flex; align-items:center; justify-content:center; background: #000; }
        .video-container iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Film veya dizi ara..." onkeyup="icerikAra()">
    </div>

    <div id="noResults" style="display:none; text-align:center; padding:40px; color:#888;">Sonuç bulunamadı.</div>
    <div id="root"></div>

    <div id="detayModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="kapat('detayModal')">&times;</span>
            <img id="m-afis" class="detay-afis" src="">
            <div style="flex: 1;">
                <h1 id="m-baslik" style="margin:0; color:var(--red); font-size: 26px;"></h1>
                <div id="m-puan" class="puan-alani"></div>
                <div class="kadro-text"><b>Oyuncular:</b> <span id="m-kadro"></span></div>
                <p id="m-ozet" style="line-height:1.6; color:#ddd; font-size: 14px; margin-top: 15px;"></p>
                <div id="m-kontrol"></div>
                <div id="m-bolumler" class="bolum-konteynir"></div>
            </div>
        </div>
    </div>

    <div id="playerModal" class="modal">
        <span class="close" style="z-index: 1002; right: 20px; top: 10px;" onclick="durdurVideo()">&times;</span>
        <div class="video-container" id="playerContainer"></div>
    </div>

    <script>
        let globalVeri = null;

        function oynat(id) {
            const playerContainer = document.getElementById('playerContainer');
            // Siyah ekranı aşmak için en kapsamlı iframe ayarları:
            playerContainer.innerHTML = `
                <iframe 
                    src="https://vidmoly.me/embed-${id}.html" 
                    frameborder="0" 
                    allowfullscreen="true" 
                    webkitallowfullscreen="true" 
                    mozallowfullscreen="true"
                    allow="autoplay; encrypted-media; picture-in-picture"
                    sandbox="allow-forms allow-scripts allow-pointer-lock allow-same-origin allow-top-navigation"
                ></iframe>`;
            
            document.getElementById('playerModal').style.display = 'block';
            document.body.style.overflow = 'hidden'; 
        }

        function durdurVideo() {
            document.getElementById('playerContainer').innerHTML = '';
            document.getElementById('playerModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function kapat(id) { 
            document.getElementById(id).style.display = 'none'; 
            document.body.style.overflow = 'auto';
        }

        function detayGoster(item, isDizi, diziAnahtari) {
            document.getElementById('m-baslik').innerText = item.ad;
            document.getElementById('m-afis').src = item.afis || 'https://via.placeholder.com/500x750?text=Afis+Yok';
            document.getElementById('m-ozet').innerText = item.konu || "Açıklama mevcut değil.";
            document.getElementById('m-puan').innerHTML = `⭐ TMDB: ${item.puan || '0.0'}`;
            document.getElementById('m-kadro').innerText = item.oyuncular || "Bilinmiyor";
            
            const kontrol = document.getElementById('m-kontrol');
            const bolumler = document.getElementById('m-bolumler');
            bolumler.innerHTML = ''; kontrol.innerHTML = '';

            if(isDizi) {
                const dizi = globalVeri.diziler[diziAnahtari];
                kontrol.innerHTML = `<h3 style="font-size:16px; margin-top:15px; border-bottom:1px solid #333; padding-bottom:5px;">Bölümler</h3>`;
                for(let s in dizi.sezonlar) {
                    bolumler.innerHTML += `<div style="grid-column: 1/-1; color:var(--red); font-weight:bold; margin-top:5px; font-size:13px;">SEZON ${s}</div>`;
                    dizi.sezonlar[s].sort((a,b) => a.bolum - b.bolum).forEach(b => {
                        bolumler.innerHTML += `<div class="bolum-item" onclick="oynat('${b.id}')">Bölüm ${b.bolum}</div>`;
                    });
                }
            } else {
                kontrol.innerHTML = `<button class="btn-izle" onclick="oynat('${item.id}')">HEMEN İZLE</button>`;
            }
            
            document.getElementById('detayModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function icerikAra() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            let sections = document.getElementsByClassName('section-title');
            let grids = document.getElementsByClassName('grid');
            let hasResults = false;

            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].querySelector('h3').innerText.toLowerCase();
                if (title.includes(input)) { cards[i].style.display = ""; hasResults = true; } 
                else { cards[i].style.display = "none"; }
            }

            for (let i = 0; i < grids.length; i++) {
                let visibleCards = grids[i].querySelectorAll('.card[style=""]').length;
                if (visibleCards === 0) { sections[i].style.display = "none"; grids[i].style.display = "none"; } 
                else { sections[i].style.display = "block"; grids[i].style.display = "grid"; }
            }
            document.getElementById('noResults').style.display = hasResults ? "none" : "block";
        }

        fetch('film.json?v=' + Date.now())
        .then(res => res.json())
        .then(data => {
            globalVeri = data;
            const root = document.getElementById('root');
            let kategoriler = {"TÜM İÇERİKLER": []};

            if(data.diziler) {
                for (let anahtar in data.diziler) {
                    const d = data.diziler[anahtar];
                    kategoriler["TÜM İÇERİKLER"].push({isDizi: true, key: anahtar, data: d});
                    (d.kategoriler || []).forEach(k => {
                        if(!kategoriler[k]) kategoriler[k] = [];
                        kategoriler[k].push({isDizi: true, key: anahtar, data: d});
                    });
                }
            }

            if(data.filmler) {
                data.filmler.forEach(f => {
                    kategoriler["TÜM İÇERİKLER"].push({isDizi: false, data: f});
                    (f.kategoriler || []).forEach(k => {
                        if(!kategoriler[k]) kategoriler[k] = [];
                        kategoriler[k].push({isDizi: false, data: f});
                    });
                });
            }

            for (let kat in kategoriler) {
                let html = `<div class="section-title">${kat}</div><div class="grid">`;
                kategoriler[kat].forEach(obj => {
                    const veriStr = JSON.stringify(obj.data).replace(/'/g, "&apos;").replace(/"/g, "&quot;");
                    html += `
                        <div class="card" onclick='detayGoster(${veriStr}, ${obj.isDizi}, "${obj.key || ''}")'>
                            <div class="badge">${obj.isDizi ? 'DİZİ' : 'FİLM'}</div>
                            <img src="${obj.data.afis || 'https://via.placeholder.com/190x280?text=Afiş+Yok'}" onerror="this.src='https://via.placeholder.com/190x280?text=Afiş+Yok'">
                            <div class="info"><h3>${obj.data.ad}</h3></div>
                        </div>`;
                });
                root.innerHTML += html + `</div>`;
            }
        });
    </script>
</body>
</html>
